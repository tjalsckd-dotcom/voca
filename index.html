<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsches Vokabelheft - Read Only v15.1</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#f8fafc; color:#0f172a; }
    .container { max-width:1050px; margin:0 auto; padding:32px 16px; }
    .header,.card { background:#fff; border-radius:28px; box-shadow:0 1px 6px rgba(15,23,42,.08); }
    .header { padding:28px; margin-bottom:24px; }
    .subtitle { color:#64748b; font-size:14px; font-weight:700; margin:0 0 8px; }
    h1 { margin:0; font-size:36px; letter-spacing:-.04em; }
    .desc { color:#475569; line-height:1.6; max-width:850px; }
    .grid { display:grid; grid-template-columns:1fr; gap:24px; align-items:start; }
    
    .card { padding:22px; }
    h2 { margin:0 0 18px; font-size:22px; }
    h3 { margin:0 0 12px; font-size:17px; }
    label { display:block; font-size:14px; font-weight:700; margin:0 0 6px; }
    input,select,textarea { width:100%; border:1px solid #cbd5e1; border-radius:18px; padding:12px 14px; font-size:15px; outline:none; background:#fff; font-family:inherit; }
    input:focus,select:focus,textarea:focus { border-color:#0f172a; }
    textarea { min-height:86px; resize:vertical; }
    .field { margin-bottom:14px; }
    .two { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:700px){ .two{grid-template-columns:1fr;} }
    .subbox { background:#f8fafc; border-radius:24px; padding:16px; margin-bottom:14px; }
    .subbox.blue { background:#eef2ff; }
    .subbox.yellow { background:#fffbeb; }
    .checkbox { display:flex; align-items:center; gap:8px; font-weight:700; margin:10px 0; }
    .checkbox input { width:auto; }
    .btn { border:0; border-radius:18px; padding:12px 16px; font-size:15px; font-weight:800; cursor:pointer; background:#0f172a; color:#fff; width:100%; }
    .btn.secondary { background:#e2e8f0; color:#0f172a; }
    .btn.small { width:auto; padding:9px 12px; border-radius:14px; font-size:13px; }
    .btn:disabled { background:#cbd5e1; cursor:not-allowed; }
    .button-row,.filter-row { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 18px; }
    .pill { border:0; border-radius:999px; padding:9px 14px; font-weight:800; cursor:pointer; background:#f1f5f9; color:#334155; }
    .pill.active { background:#0f172a; color:#fff; }
    .entry { border:1px solid #e2e8f0; border-radius:24px; padding:16px; margin-bottom:12px; background:#fff; }
    .entry-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .entry-main { cursor:pointer; flex:1; }
    .badge { display:inline-block; border-radius:999px; background:#f1f5f9; color:#334155; padding:4px 10px; font-size:12px; font-weight:900; margin:0 6px 8px 0; }
    .badge.dark { background:#0f172a; color:#fff; }
    .badge.warn { background:#fff7ed; color:#9a3412; }
    .entry h3 { margin:0 0 6px; font-size:20px; }
    .entry p { margin:4px 0; color:#475569; }
    .small { font-size:14px; color:#64748b; }
    .icon-btn { border:0; border-radius:50%; background:#f1f5f9; width:36px; height:36px; cursor:pointer; font-weight:900; margin-left:4px; }
    .icon-btn.delete:hover { background:#fee2e2; color:#dc2626; }
    .icon-btn.edit:hover { background:#dbeafe; color:#1d4ed8; }
    .details { margin-top:14px; padding-top:14px; border-top:1px solid #e2e8f0; }
    .info-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px; }
    @media(max-width:780px){ .info-grid{grid-template-columns:1fr;} }
    .info { background:#f8fafc; border-radius:18px; padding:12px; }
    .info .k { font-size:12px; font-weight:900; color:#64748b; text-transform:uppercase; }
    .info .v { margin-top:4px; font-weight:800; }
    .detail-block { background:#f8fafc; border-radius:18px; padding:12px; margin-top:10px; white-space:pre-wrap; }
    .warning { display:none; background:#fffbeb; color:#92400e; border:1px solid #fde68a; border-radius:18px; padding:12px; font-size:14px; margin-bottom:14px; }
    .edit-banner { display:none; background:#dbeafe; color:#1e3a8a; border:1px solid #bfdbfe; border-radius:18px; padding:12px; font-weight:700; margin-bottom:14px; }
    .empty { border:1px dashed #cbd5e1; border-radius:24px; padding:48px 16px; text-align:center; color:#64748b; }
    .count { display:inline-block; margin-top:12px; background:#f1f5f9; color:#334155; border-radius:18px; padding:10px 14px; font-size:14px; font-weight:700; }
    table { width:100%; border-collapse:collapse; overflow:hidden; border-radius:16px; background:white; margin-top:10px; }
    th,td { border-bottom:1px solid #e2e8f0; padding:10px; text-align:left; font-size:14px; vertical-align:top; }
    th { background:#f1f5f9; color:#334155; font-weight:900; }
    tr:nth-child(even) td { background:#f8fafc; }
    tr:last-child td { border-bottom:0; }
    .tense-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
    @media(max-width:1100px){ .tense-grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
    @media(max-width:780px){ .tense-grid{grid-template-columns:1fr;} }
    .tense-card { background:#fff; border:1px solid #e2e8f0; border-radius:18px; padding:12px; }
    .tense-title { font-weight:900; font-style:italic; margin-bottom:8px; }
    .conj-input-row { display:grid; grid-template-columns:95px 1fr; gap:8px; align-items:center; margin-bottom:8px; }
    .conj-input-row span { font-weight:800; color:#475569; font-size:14px; }
    .prep-item { border:1px solid #e2e8f0; background:white; border-radius:18px; padding:12px; margin-bottom:10px; }

    .type-verb { background:#dbeafe; color:#1e40af; }
    .type-noun { background:#dcfce7; color:#166534; }
    .type-expression { background:#fef3c7; color:#92400e; }
    .type-word { background:#f3e8ff; color:#6b21a8; }
    .article-der { background:#dbeafe; color:#1e40af; }
    .article-die { background:#fee2e2; color:#991b1b; }
    .article-das { background:#dcfce7; color:#166534; }
    .verb-regular { background:#e0f2fe; color:#075985; }
    .verb-irregular { background:#ffedd5; color:#9a3412; }
    .verb-separable { background:#ede9fe; color:#5b21b6; }
    .verb-inseparable { background:#e0e7ff; color:#3730a3; }
    .verb-modal { background:#fce7f3; color:#9d174d; }
    .hero-strip {
      height:8px;
      border-radius:999px;
      background:linear-gradient(90deg,#60a5fa,#22c55e,#f59e0b,#a855f7);
      margin-top:18px;
    }
    .sync-status {
      display:inline-block;
      margin-left:10px;
      background:#ecfeff;
      color:#155e75;
      border:1px solid #a5f3fc;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      font-weight:800;
    }
    .readonly-note { display:inline-block; margin-left:10px; background:#f1f5f9; color:#334155; border:1px solid #cbd5e1; border-radius:999px; padding:8px 12px; font-size:13px; font-weight:800; }
    .sync-status.error {
      background:#fef2f2;
      color:#991b1b;
      border-color:#fecaca;
    }
    .section-title-verb { border-left:6px solid #60a5fa; }
    .section-title-noun { border-left:6px solid #22c55e; }
    .section-title-expression { border-left:6px solid #f59e0b; }
    .section-title-word { border-left:6px solid #a855f7; }
    .colored-card { border-top:6px solid #e2e8f0; }
    .colored-card.verb-card { border-top-color:#60a5fa; }
    .colored-card.noun-card { border-top-color:#22c55e; }
    .colored-card.expression-card { border-top-color:#f59e0b; }
    .colored-card.word-card { border-top-color:#a855f7; }

  
    /* Compact read-only conjugation layout */
    .detail-block {
      padding: 10px;
      margin-top: 8px;
    }
    .tense-grid {
      gap: 8px;
    }
    .tense-card {
      padding: 8px;
      border-radius: 14px;
    }
    .tense-title {
      margin-bottom: 6px;
      font-size: 15px;
    }
    table {
      margin-top: 4px;
    }
    th, td {
      padding: 6px 8px;
      font-size: 13px;
      line-height: 1.25;
    }
    .entry {
      padding: 14px;
      margin-bottom: 10px;
    }
    .details {
      margin-top: 10px;
      padding-top: 10px;
    }
    .info {
      padding: 10px;
      border-radius: 14px;
    }
    .info-grid {
      gap: 8px;
      margin-bottom: 8px;
    }
    .prep-item {
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 14px;
    }
    @media(max-width:1100px){
      .tense-grid {
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
    }
    @media(max-width:780px){
      .tense-grid {
        grid-template-columns:1fr;
      }
      th, td {
        padding: 7px 8px;
      }
    }

  
    /* Dense conjugation layout v8 */
    .detail-block {
      padding: 8px !important;
      margin-top: 8px !important;
      border-radius: 14px !important;
    }

    .detail-block > strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .tense-grid {
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      gap: 8px !important;
      align-items: start !important;
    }

    .tense-card {
      padding: 8px !important;
      border-radius: 14px !important;
      align-self: start !important;
      min-height: 0 !important;
      height: auto !important;
    }

    .tense-title {
      margin: 0 0 6px 0 !important;
      padding: 0 !important;
      font-size: 15px !important;
      line-height: 1.2 !important;
    }

    .tense-card table {
      margin: 0 !important;
      border-radius: 10px !important;
    }

    .tense-card tbody,
    .tense-card tr,
    .tense-card td {
      height: auto !important;
      min-height: 0 !important;
    }

    .tense-card td {
      padding: 5px 8px !important;
      font-size: 14px !important;
      line-height: 1.15 !important;
    }

    .tense-card td:first-child {
      width: 82px !important;
      white-space: nowrap !important;
    }

    .details {
      margin-top: 8px !important;
      padding-top: 8px !important;
    }

    .entry {
      padding: 12px !important;
      margin-bottom: 8px !important;
      border-radius: 20px !important;
    }

    .info-grid {
      gap: 8px !important;
      margin-bottom: 8px !important;
    }

    .info {
      padding: 9px !important;
      border-radius: 14px !important;
    }

    @media(max-width:1100px){
      .tense-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }
    }

    @media(max-width:780px){
      .tense-grid {
        grid-template-columns: 1fr !important;
      }
    }

  
    /* v9: single compact conjugation matrix */
    .conjugation-block {
      padding: 10px !important;
      margin-top: 8px !important;
    }

    .conjugation-matrix {
      width: 100%;
      border-collapse: collapse;
      margin: 6px 0 0 0 !important;
      table-layout: fixed;
      border-radius: 14px;
      overflow: hidden;
      background: white;
    }

    .conjugation-matrix th,
    .conjugation-matrix td {
      padding: 7px 8px !important;
      font-size: 13.5px !important;
      line-height: 1.2 !important;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
    }

    .conjugation-matrix th {
      background: #f8fafc;
      font-weight: 900;
      text-align: left;
      white-space: nowrap;
    }

    .conjugation-matrix th:first-child,
    .conjugation-matrix td:first-child {
      width: 92px;
      font-weight: 900;
      color: #0f172a;
      background: #f8fafc;
    }

    .conjugation-matrix tr:nth-child(even) td {
      background: #f8fafc;
    }

    .conjugation-matrix tr:nth-child(even) td:first-child {
      background: #eef2f7;
    }

    .conjugation-matrix tr:last-child td {
      border-bottom: none;
    }

    @media(max-width:900px){
      .conjugation-matrix {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
      .conjugation-matrix th,
      .conjugation-matrix td {
        min-width: 140px;
      }
      .conjugation-matrix th:first-child,
      .conjugation-matrix td:first-child {
        position: sticky;
        left: 0;
        z-index: 1;
        min-width: 82px;
      }
    }

  
    :root {
      --ui-font-scale: 1;
    }

    body {
      font-size: calc(16px * var(--ui-font-scale));
    }

    input, select, textarea, button {
      font-size: calc(15px * var(--ui-font-scale)) !important;
    }

    .entry h3 {
      font-size: calc(20px * var(--ui-font-scale)) !important;
    }

    .entry p,
    .desc,
    .info .v {
      font-size: calc(16px * var(--ui-font-scale)) !important;
    }

    .small,
    .badge,
    .info .k,
    .subtitle {
      font-size: calc(13px * var(--ui-font-scale)) !important;
    }

    h1 {
      font-size: calc(36px * var(--ui-font-scale)) !important;
    }

    h2 {
      font-size: calc(22px * var(--ui-font-scale)) !important;
    }

    h3 {
      font-size: calc(17px * var(--ui-font-scale)) !important;
    }

    th, td {
      font-size: calc(14px * var(--ui-font-scale)) !important;
    }

    .conjugation-matrix th,
    .conjugation-matrix td {
      font-size: calc(13.5px * var(--ui-font-scale)) !important;
    }

    .font-controls {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      margin-left: 10px;
      padding: 6px;
      border-radius: 999px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      vertical-align: middle;
    }

    .font-controls-label {
      padding: 0 6px;
      font-weight: 900;
      color: #475569;
      font-size: 13px;
    }

    .font-size-btn {
      width: auto;
      border: none;
      border-radius: 999px;
      padding: 7px 10px;
      background: transparent;
      color: #334155;
      font-weight: 900;
      cursor: pointer;
    }

    .font-size-btn.active {
      background: #0f172a;
      color: white;
    }

    .font-size-btn:hover {
      background: #e2e8f0;
    }

    .font-size-btn.active:hover {
      background: #0f172a;
    }

    @media(max-width:780px){
      .font-controls {
        display: flex;
        margin-left: 0;
        width: fit-content;
      }
    }

  
    /* v11/v8.3 font and conjugation readability tuning */
    .font-controls {
      gap: 4px !important;
      padding: 5px !important;
    }
    .font-size-btn {
      padding: 6px 9px !important;
    }
    .conjugation-matrix th,
    .conjugation-matrix td {
      font-size: calc(14px * var(--ui-font-scale)) !important;
      padding: 8px 9px !important;
    }
    .conjugation-matrix th:first-child,
    .conjugation-matrix td:first-child {
      width: 86px !important;
    }

  
    /* Compact entry header layout */
    .entry-main-compact {
      display: grid !important;
      grid-template-columns: auto 1fr;
      column-gap: 12px;
      align-items: start;
    }

    .entry-type-column {
      grid-column: 1;
      grid-row: 1;
      padding-top: 2px;
    }

    .entry-content-column {
      grid-column: 2;

    }

    .entry-type-column .badge {

    }

    .entry-content-column .badge {

    }

    .entry-content-column h3 {
      margin-top: 0 !important;

    }

    .entry-content-column p {

    }

    .entry-content-column .small {

    }

    .entry-top {
      align-items: flex-start !important;
    }

      .entry-main-compact {
        column-gap: 8px;
      }
      .entry-type-column .badge {
        padding: 4px 8px;
      }

    .header {
      background:
        radial-gradient(circle at 15% 20%, rgba(96,165,250,.16), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(245,158,11,.14), transparent 24%),
        #ffffff;
    }

    .public-hero-tools {
      margin-top: 22px;

      grid-template-columns: 1fr;

    }

      position: relative;
    }

    .hero-search-wrap input {
      min-height: 58px;

    }

    }

    .stat-label {

    /* =========================================================
       PUBLIC v14 VISUAL DESIGN PASS
       Goal: warm study-page feel, clearer hierarchy, less "raw app"
       ========================================================= */
    :root {
      --page-bg: #faf7f0;
      --paper: #fffdf8;
      --paper-2: #fffaf0;
      --ink: #172033;
      --muted: #667085;
      --line: #eadfce;
      --soft-shadow: 0 12px 34px rgba(67, 56, 38, .08);
      --soft-shadow-sm: 0 5px 18px rgba(67, 56, 38, .06);
      --verb: #3b82f6;
      --noun: #22c55e;
      --expr: #f59e0b;
      --word: #8b5cf6;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.08), transparent 28rem),
        radial-gradient(circle at top right, rgba(245,158,11,.10), transparent 26rem),
        var(--page-bg) !important;
      color: var(--ink) !important;
    }

    .container {
      max-width: 1120px !important;
      padding-top: 28px !important;
    }

    .header {
      border-radius: 30px !important;
      border: 1px solid rgba(234,223,206,.9) !important;
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,250,240,.94)),
        radial-gradient(circle at 20% 15%, rgba(59,130,246,.10), transparent 20rem),
        radial-gradient(circle at 88% 0%, rgba(245,158,11,.12), transparent 18rem) !important;
      box-shadow: var(--soft-shadow) !important;
      padding: 34px !important;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: "";
      position: absolute;
      left: 34px;
      top: 24px;
      width: 72px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--verb), var(--noun), var(--expr), var(--word));
      opacity: .85;
    }

    .subtitle {
      margin-top: 12px !important;
      color: #7c6f5e !important;
      letter-spacing: .08em !important;
      text-transform: uppercase;
    }

    h1 {
      color: var(--ink) !important;
      font-weight: 950 !important;
      letter-spacing: -.055em !important;
    }

    .desc {

<script>
const SUPABASE_URL = "https://lcigmqokdynxvxflarqt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_wsBIHXSt2gZ1xN_1PndJVw_GF1q2hSB";

let entries = [];
let openId = null;
let typeFilter = "all";
let prepositionOnly = false;

const persons = [["ich","ich"],["du","du"],["er","er/sie/es"],["wir","wir"],["ihr","ihr"],["sie","sie/Sie"]];
const imperativePersons = [["du","du"],["wir","wir"],["ihr","ihr"],["Sie","Sie"]];
const displayTenseConfig = [
  { key:"praesens", label:"Präsens", persons },
  { key:"perfektAuto", label:"Perfekt", persons },
  { key:"praeteritum", label:"Präteritum", persons },
  { key:"konjunktiv2Praeteritum", label:"Konjunktiv II - Präteritum", persons },
  { key:"imperativ", label:"Imperativ", persons:imperativePersons }
];

const $ = id => document.getElementById(id);
const elements = {
  entries:$("entries"),
  search:$("search"),
  heroSearch:$("heroSearch"),
  entryCount:$("entryCount"),
  prepOnlyBtn:$("prepOnlyBtn"),
  syncStatus:$("syncStatus")
};

function setStatus(message, isError=false){
  elements.syncStatus.textContent = message;
  elements.syncStatus.classList.toggle("error", isError);
}

function normalizeGerman(value){
  return String(value || "").trim().toLowerCase().replace(/^der\s+|^die\s+|^das\s+/i,"").replace(/\s+/g," ");
}

function typeLabel(type){
  return type==="verb" ? "Verb" : type==="noun" ? "Nomen" : type==="expression" ? "Ausdruck" : "Wort";
}

function escapeHtml(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}


function perfektAuxiliaryForms(auxiliary){
  if(auxiliary === "sein"){
    return { ich:"bin", du:"bist", er:"ist", wir:"sind", ihr:"seid", sie:"sind" };
  }
  return { ich:"habe", du:"hast", er:"hat", wir:"haben", ihr:"habt", sie:"haben" };
}
function reflexivePronouns(){
  return { ich:"mich", du:"dich", er:"sich", wir:"uns", ihr:"euch", sie:"sich" };
}
function getDisplayConjugation(entry, tenseKey, personKey){
  const conj = entry.conjugation || {};
  if(tenseKey === "perfektAuto"){
    const partizip = entry.partizipII || "";
    if(!partizip) return "-";
    const auxiliary = perfektAuxiliaryForms(entry.auxiliary || "haben")[personKey] || "";
    const reflexive = entry.isReflexive ? (reflexivePronouns()[personKey] || "") + " " : "";
    return `${auxiliary} ${reflexive}${partizip}`.trim();
  }
  return conj?.[tenseKey]?.[personKey] || "-";
}

function typeClass(type){
  return type==="verb" ? "type-verb" : type==="noun" ? "type-noun" : type==="expression" ? "type-expression" : "type-word";
}

function articleClass(article){
  return article==="der" ? "article-der" : article==="die" ? "article-die" : "article-das";
}

function verbClassClass(value){
  if(value==="regelmäßig") return "verb-regular";
  if(value==="unregelmäßig") return "verb-irregular";
  if(value==="trennbar") return "verb-separable";
  if(value==="untrennbar") return "verb-inseparable";
  if(value==="modal") return "verb-modal";
  return "";
}

function cardClass(type){
  return type==="verb" ? "verb-card" : type==="noun" ? "noun-card" : type==="expression" ? "expression-card" : "word-card";
}

async function supabaseRequest(path){
  const response = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method: "GET",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json"
    }
  });

  if(!response.ok){
    const text = await response.text();
    throw new Error(text || `Supabase error ${response.status}`);
  }

  const text = await response.text();
  return text ? JSON.parse(text) : null;
}

function fromDb(row){
  return {
    id: row.id,
    german: row.german || "",
    normalizedGerman: row.normalized_german || "",
    type: row.type || "word",
    meaningKo: row.meaning || "",
    article: row.article || "",
    plural: row.plural || "",
    infinitive: row.infinitive || "",
    partizipII: row.partizip_ii || "",
    auxiliary: row.auxiliary || "",
    verbClass: row.verb_class || "",
    isReflexive: Boolean(row.is_reflexive),
    isPrepositionalVerb: Boolean(row.is_prepositional_verb),
    conjugation: row.conjugation || {},
    prepMeanings: row.prep_meanings || [],
    exampleDe: row.example_de || "",
    exampleKo: row.example_translation || "",
    notes: row.notes || "",
    createdAt: row.created_at,
    updatedAt: row.updated_at
  };
}


async function loadEntries(){
  try{
    setStatus("Wird geladen...");
    const rows = await supabaseRequest("vocab_entries?select=*&order=german.asc");
    entries = (rows || []).map(fromDb);
    setStatus("Online");
    render();
  } catch(error){
    console.error(error);
    setStatus("Verbindung fehlgeschlagen", true);
    elements.entries.innerHTML = `<div class="empty">Supabase-Verbindung fehlgeschlagen.<br><br><span class="small">${escapeHtml(error.message)}</span></div>`;
  }
}

window.toggleOpen = function(id){
  openId = openId === id ? null : id;
  render();
};

function renderConjugationTables(entry){
  const mainPersons = persons;
  const tenseColumns = [
    { key:"praesens", label:"Präsens" },
    { key:"perfektAuto", label:"Perfekt" },
    { key:"praeteritum", label:"Präteritum" },
    { key:"konjunktiv2Praeteritum", label:"Konj. II" }
  ];

  const mainTable = `<table class="conjugation-matrix">
    <thead>
      <tr>
        <th>Person</th>
        ${tenseColumns.map(t => `<th>${t.label}</th>`).join("")}
      </tr>
    </thead>
    <tbody>
      ${mainPersons.map(([p,label]) => `
        <tr>
          <td>${label}</td>
          ${tenseColumns.map(t => {
            const value = getDisplayConjugation(entry, t.key, p);
            return `<td>${value === "-" ? '<span class="matrix-empty">-</span>' : escapeHtml(value)}</td>`;
          }).join("")}
        </tr>
      `).join("")}
    </tbody>
  </table>`;

  const imperativeTable = `<table class="conjugation-matrix">
    <thead>
      <tr><th>Imperativ</th><th>Form</th></tr>
    </thead>
    <tbody>
      ${imperativePersons.map(([p,label]) => `
        <tr>
          <td>${label}</td>
          <td>${getDisplayConjugation(entry, "imperativ", p) === "-" ? '<span class="matrix-empty">-</span>' : escapeHtml(getDisplayConjugation(entry, "imperativ", p))}</td>
        </tr>
      `).join("")}
    </tbody>
  </table>`;

  return `<div class="detail-block conjugation-block"><strong>Konjugation</strong><div class="mobile-scroll-hint">← Tabelle horizontal scrollen →</div>${mainTable}${imperativeTable}</div>`;
}

function renderPrepMeanings(entry){
  if(!entry.prepMeanings || entry.prepMeanings.length === 0) return "";
  const items = entry.prepMeanings.map(item => {
    const translation = item.exampleTranslation || item.example_translation || "";
    const exampleBlock = item.example ? `<div class="prep-line"><strong>Beispiel:</strong> ${escapeHtml(item.example)}</div>` : "";
    const translationBlock = translation ? `<div class="prep-line"><strong>Übersetzung:</strong> ${escapeHtml(translation)}</div>` : "";
    return `<div class="prep-item compact-prep-item"><div class="prep-head"><span class="badge dark">${escapeHtml(item.preposition)} + ${escapeHtml(item.caseName)}</span><span class="prep-meaning"><strong>Bedeutung:</strong> ${escapeHtml(item.meaning)}</span></div>${(exampleBlock || translationBlock) ? `<div class="prep-example-grid">${exampleBlock}${translationBlock}</div>` : ""}</div>`;
  }).join("");
  return `<div class="detail-block prep-block"><strong>Präpositionale Bedeutungen</strong><div class="prep-list">${items}</div></div>`;
}

function render(){
  const query = normalizeGerman(elements.search.value);
  const filtered = entries.filter(e => {
    if(typeFilter !== "all" && e.type !== typeFilter) return false;
    if(prepositionOnly && !(e.type==="verb" && e.prepMeanings && e.prepMeanings.length)) return false;
    if(!query) return true;
    const prepText = (e.prepMeanings || []).map(p => `${p.preposition} ${p.caseName} ${p.meaning} ${p.example} ${p.exampleTranslation || p.example_translation || ""}`).join(" ");
    const conjText = JSON.stringify(e.conjugation || {});
    return e.normalizedGerman.includes(query) ||
      e.german.toLowerCase().includes(query) ||
      e.meaningKo.toLowerCase().includes(query) ||
      (e.exampleDe||"").toLowerCase().includes(query) ||
      (e.exampleKo||"").toLowerCase().includes(query) ||
      prepText.toLowerCase().includes(query) ||
      conjText.toLowerCase().includes(query);
  }).sort((a,b) => a.german.localeCompare(b.german,"de"));

  elements.entryCount.textContent = entries.length;

  if(filtered.length === 0){
    elements.entries.innerHTML = '<div class="empty">Keine Einträge gefunden.</div>';
    return;
  }

  elements.entries.innerHTML = filtered.map(e => {
    const isOpen = openId === e.id;
    const title = e.type==="noun" ? `<span class="badge ${articleClass(e.article)}">${escapeHtml(e.article)}</span> ${escapeHtml(e.german)}` : escapeHtml(e.german);
    const prepSummary = e.type==="verb" && e.prepMeanings?.length ? `<span class="badge warn">${e.prepMeanings.length} Präposition(en)</span>` : "";
    const extra = e.type==="verb"
      ? `<p class="small">Partizip II: ${escapeHtml(e.partizipII || "-")} · ${escapeHtml(e.auxiliary || "-")} · <span class="badge ${verbClassClass(e.verbClass)}">${escapeHtml(e.verbClass || "-")}</span></p>`
      : e.type==="noun" && e.plural
        ? `<p class="small">Plural: ${escapeHtml(e.plural)}</p>`
        : "";

    let details = "";

    if(isOpen){
      if(e.type==="verb"){
        details += `<div class="info-grid">
          <div class="info"><div class="k">Infinitiv</div><div class="v">${escapeHtml(e.infinitive || e.german)}</div></div>
          <div class="info"><div class="k">Partizip II</div><div class="v">${escapeHtml(e.partizipII || "-")}</div></div>
          <div class="info"><div class="k">Hilfsverb</div><div class="v">${escapeHtml(e.auxiliary || "-")}</div></div>
          <div class="info"><div class="k">Verbklasse</div><div class="v">${escapeHtml(e.verbClass || "-")}</div></div>
          <div class="info"><div class="k">reflexiv</div><div class="v">${e.isReflexive ? "ja" : "nein"}</div></div>
          <div class="info"><div class="k">Präpositionalverb</div><div class="v">${e.isPrepositionalVerb || e.prepMeanings?.length ? "ja" : "nein"}</div></div>
        </div>` + renderConjugationTables(e) + renderPrepMeanings(e);
      }

      if(e.type==="noun"){
        details += `<div class="info-grid">
          <div class="info"><div class="k">Artikel</div><div class="v">${escapeHtml(e.article || "-")}</div></div>
          <div class="info"><div class="k">Plural</div><div class="v">${escapeHtml(e.plural || "-")}</div></div>
        </div>`;
      }

      if(e.exampleDe || e.exampleKo){
        details += `<div class="detail-block"><strong>Beispiel</strong><br>${escapeHtml(e.exampleDe)}<br><span class="small">${escapeHtml(e.exampleKo)}</span></div>`;
      }

      if(e.notes){
        details += `<div class="detail-block"><strong>Notizen</strong><br>${escapeHtml(e.notes)}</div>`;
      }

      details = `<div class="details">${details}</div>`;
    }

    return `<article class="entry colored-card ${cardClass(e.type)}">
      <div class="entry-top">
        <div class="entry-main entry-main-compact" onclick="toggleOpen('${e.id}')">
          <div class="entry-type-column"><span class="badge ${typeClass(e.type)}">${typeLabel(e.type)}</span></div>
          <div class="entry-content-column">${prepSummary}
          <h3>${title}</h3>
          <p>Bedeutung: ${escapeHtml(e.meaningKo)}</p>
          ${extra}
          </div>
        </div>
        <div class="entry-right-meta">${e.type === "verb" ? escapeHtml(e.auxiliary || "") : e.type === "noun" ? escapeHtml(e.plural || "") : ""}</div>
        <div>
          <button class="icon-btn" onclick="event.stopPropagation(); toggleOpen('${e.id}')" title="Details">${isOpen ? "⌃" : "⌄"}</button>
        </div>
      </div>${details}</article>`;
  }).join("");
}

document.querySelectorAll("[data-filter]").forEach(btn => btn.addEventListener("click", () => {
  typeFilter = btn.dataset.filter;
  document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}));

elements.prepOnlyBtn.addEventListener("click", () => {
  prepositionOnly = !prepositionOnly;
  elements.prepOnlyBtn.classList.toggle("active", prepositionOnly);
  render();
});

elements.search.addEventListener("input", render);
elements.heroSearch.addEventListener("input", () => {
  elements.search.value = elements.heroSearch.value;
  render();
});


function applyFontScale(scale){
  const value = String(scale || "1");
  document.documentElement.style.setProperty("--ui-font-scale", value);
  localStorage.setItem("german-vocab-public-font-scale-v1", value);
  document.querySelectorAll("[data-font-scale]").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.fontScale === value);
  });
}

function initFontControls(){
  const saved = localStorage.getItem("german-vocab-public-font-scale-v1") || "1";
  applyFontScale(saved);
  document.querySelectorAll("[data-font-scale]").forEach(btn => {
    btn.addEventListener("click", () => applyFontScale(btn.dataset.fontScale));
  });
}

initFontControls();
loadEntries();
</script>
</body>
</html>
